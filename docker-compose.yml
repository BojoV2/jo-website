services:
  db:
    image: postgres:16-alpine
    container_name: pdf_workflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdf_workflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pdf_workflow_backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./storage:/app/storage
    command: sh -c "npm install && npm run db:init && npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: pdf_workflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
